version: '3.9'

# ============================================================
# ATLAS Platform — Local Development Stack
# Usage: docker compose up -d
# ============================================================

networks:
  atlas-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:
  # ----------------------------------------------------------
  # PostgreSQL — Primary Data Store
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: atlas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas_dev_password
      POSTGRES_DB: atlas_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U atlas -d atlas_dev']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atlas-network

  # ----------------------------------------------------------
  # Redis — Event Bus + Cache + Session Store
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: atlas-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atlas-network

  # ----------------------------------------------------------
  # Redis Insight — Redis GUI (dev only)
  # ----------------------------------------------------------
  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: atlas-redis-insight
    restart: unless-stopped
    ports:
      - '5540:5540'
    depends_on:
      - redis
    networks:
      - atlas-network
    profiles:
      - tools

  # ----------------------------------------------------------
  # pgAdmin — PostgreSQL GUI (dev only)
  # ----------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: atlas-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@atlas.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    networks:
      - atlas-network
    profiles:
      - tools

  # ----------------------------------------------------------
  # ATLAS API — Main Application
  # ----------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: atlas-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      REDIS_HOST: redis
    ports:
      - '3000:3000'
      - '9229:9229'
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - atlas-network
    profiles:
      - app
